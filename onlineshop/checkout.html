
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ข้อมูลการจัดส่ง | Online Shop</title>
<link rel="stylesheet" href="style.css">
<style>

.checkout-wrapper {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
}

.form-box, .summary-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-weight: 500;
    display: block;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.total-box {
    margin-top: 15px;
    border-top: 1px solid #ddd;
    padding-top: 10px;
    font-weight: bold;
    font-size: 18px;
}

</style>
</head>
<body>

<div class="navbar">
    <a href="contact.html">ติดต่อเรา</a>
<a href="guide.html">คู่มือ</a>
<a href="faq.html">คำถามที่พบบ่อย</a>

    <div class="logo">🛍 Online Shop</div>
    <div>
        <a href="index.html">หน้าแรก</a>
        <a href="cart.html">ตะกร้า</a>
        <a href="tracking.html">ติดตามพัสดุ</a>
    </div>
</div>

<div class="container">
<h2>📦 ข้อมูลการจัดส่ง</h2>

<div class="checkout-wrapper">

<!-- ฝั่งซ้าย: ฟอร์ม -->
<div class="form-box">

<div class="form-group">
<label>ชื่อ - นามสกุล</label>
<input id="fullname">
</div>

<div class="form-group">
<label>เบอร์โทรศัพท์</label>
<input id="phone">
</div>

<div class="form-group">
<label>อีเมล</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>ที่อยู่</label>
<textarea id="address"></textarea>
</div>

<div class="form-group">
<label>จังหวัด</label>
<select id="province">
<option>กรุงเทพมหานคร</option>
<option>เชียงใหม่</option>
<option>ขอนแก่น</option>
<option>ภูเก็ต</option>
<option>ชลบุรี</option>
</select>
</div>

<div class="form-group">
<label>รหัสไปรษณีย์</label>
<input id="zipcode">
</div>

<div class="form-group">
<label>วิธีจัดส่ง</label>
<select id="shipping">
<option value="40">Standard (40 บาท)</option>
<option value="80">Express (80 บาท)</option>
</select>
</div>

<div class="form-group">
<label>วิธีชำระเงิน</label>
<select id="payment">
<option>เก็บเงินปลายทาง</option>
<option>โอนผ่านธนาคาร</option>
<option>บัตรเครดิต</option>
</select>
</div>

<button class="btn btn-green" onclick="confirmOrder()">
ยืนยันการสั่งซื้อ
</button>

</div>

<!-- ฝั่งขวา: สรุปสินค้า -->
<div class="summary-box">
<h3>🛒 สรุปคำสั่งซื้อ</h3>
<div id="order-summary"></div>

<div class="summary-item">
<span>ค่าส่ง</span>
<span id="shipping-cost">40</span> บาท
</div>

<div class="total-box">
รวมทั้งหมด: <span id="grand-total">0</span> บาท
</div>

</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let subtotal = 0;
let summary = document.getElementById("order-summary");

cart.forEach(item=>{
subtotal += item.price * item.qty;
summary.innerHTML += `
<div class="summary-item">
<span>${item.name} x${item.qty}</span>
<span>${item.price*item.qty}</span>
</div>`;
});

let shippingSelect = document.getElementById("shipping");
let shippingCost = 40;

function calculate(){
shippingCost = parseInt(shippingSelect.value);
document.getElementById("shipping-cost").innerText = shippingCost;
document.getElementById("grand-total").innerText = subtotal + shippingCost;
}

shippingSelect.addEventListener("change", calculate);
calculate();

function confirmOrder(){

if(!fullname.value || !phone.value || !address.value){
alert("กรุณากรอกข้อมูลให้ครบ");
return;
}

let tracking = "TH" + Math.floor(Math.random()*1000000);
localStorage.setItem("tracking", tracking);
localStorage.removeItem("cart");

alert("สั่งซื้อสำเร็จ 🎉 เลขพัสดุ: " + tracking);
window.location = "tracking.html";
}
</script>

<div class="footer">

</div>

</body>
</html>
